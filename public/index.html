<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel PSI — Genthe Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Supabase config — preenchido pelo Vercel via env vars -->
<script>
  const SUPABASE_URL      = '%%SUPABASE_URL%%';
  const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
  const ADMIN_PASSWORD    = '%%ADMIN_PASSWORD%%';
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1B5E37;--verde-m:#2E7D52;--verde-l:#4CAF80;
  --ouro:#B8943A;--ouro-l:#D4AC50;
  --creme:#F5F2EC;--creme-d:#EAE5DB;
  --text:#1A1A1A;--muted:#6B6B6B;--border:#D8D2C6;
  --white:#FFFFFF;--erro:#C0392B;
}
body{font-family:'DM Sans',sans-serif;background:var(--creme);color:var(--text);min-height:100vh}

/* ── LOGIN ──────────────────────────────────────────────────────── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--verde);
}
.login-box{
  background:var(--white);border-radius:16px;padding:2.5rem 2rem;
  width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.18);
}
.login-logo{
  display:flex;align-items:center;gap:10px;
  justify-content:center;margin-bottom:1.5rem;
}
.login-marca{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--verde);line-height:1.2}
.login-marca small{display:block;font-family:'DM Sans',sans-serif;font-size:0.72rem;color:var(--muted);font-weight:400}
.login-box label{font-size:0.78rem;font-weight:600;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase}
.login-box input{
  width:100%;border:1px solid var(--border);border-radius:8px;
  padding:0.65rem 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.875rem;
  outline:none;margin-bottom:1rem;transition:border-color .15s;background:var(--white);
}
.login-box input:focus{border-color:var(--verde-m)}
.btn-entrar{
  width:100%;background:var(--verde);color:#fff;border:none;border-radius:10px;
  padding:0.85rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.btn-entrar:hover{background:var(--verde-m)}
.login-erro{font-size:0.8rem;color:var(--erro);text-align:center;margin-top:0.6rem;display:none}

/* ── PAINEL ─────────────────────────────────────────────────────── */
.painel{display:none}

.ph{background:var(--verde);position:relative}
.ph::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--ouro)}
.ph-inner{
  max-width:1140px;margin:0 auto;padding:1.1rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.ph-brand{display:flex;align-items:center;gap:10px}
.ph-nome{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#fff}
.ph-sub{font-size:0.72rem;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase}
.btn-sair{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.8);border-radius:8px;padding:0.4rem 1rem;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;transition:background .15s;
}
.btn-sair:hover{background:rgba(255,255,255,.2)}

/* stats */
.stats{max-width:1140px;margin:1.5rem auto 0;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem}
.stat-l{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.stat-v{font-size:1.55rem;font-weight:500;color:var(--verde);line-height:1}

/* toolbar */
.toolbar{max-width:1140px;margin:1.25rem auto 0;padding:0 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.toolbar-titulo{font-size:.95rem;font-weight:500;flex:1;min-width:120px}
.btn-acao{
  display:flex;align-items:center;gap:5px;background:var(--white);
  border:1px solid var(--border);border-radius:8px;padding:.4rem .85rem;
  font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--text);transition:background .12s;
}
.btn-acao:hover{background:var(--creme)}
.btn-acao.verde{background:var(--verde);color:#fff;border-color:var(--verde)}
.btn-acao.verde:hover{background:var(--verde-m)}
.btn-acao svg{flex-shrink:0}

/* busca */
.busca-wrap{max-width:1140px;margin:.75rem auto 0;padding:0 1.5rem}
.busca{
  width:100%;border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;
  font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;
  transition:border-color .15s;background:var(--white);
}
.busca:focus{border-color:var(--verde-m)}

/* cards */
.cards-wrap{max-width:1140px;margin:.75rem auto 2.5rem;padding:0 1.5rem;display:flex;flex-direction:column;gap:10px}

.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--verde-l)}
.card-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.25rem;cursor:pointer;gap:10px;
}
.card-nome{font-weight:500;font-size:.9rem}
.card-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:.72rem;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-data{color:var(--muted)}
.tag-cargo{background:var(--creme);color:var(--verde-m)}
.tag-setor{background:#EBF5EF;color:var(--verde)}
.chevron{width:24px;height:24px;background:var(--creme);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.chevron svg{width:13px;height:13px;stroke:var(--muted);stroke-width:2;fill:none}
.card.aberto .chevron{transform:rotate(180deg)}

.card-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--creme-d)}
.card.aberto .card-body{display:block}

.secao{margin-top:1rem}
.secao-titulo{
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ouro);margin-bottom:.55rem;display:flex;align-items:center;gap:6px;
}
.secao-titulo::after{content:'';flex:1;height:1px;background:var(--creme-d)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.item{background:var(--creme);border-radius:8px;padding:.55rem .8rem}
.item.full{grid-column:1/-1}
.item-l{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ouro);margin-bottom:2px}
.item-v{font-size:.82rem;color:var(--text);line-height:1.5}

.empty{text-align:center;padding:3rem 1.5rem;color:var(--muted);font-size:.88rem}
.empty svg{width:44px;height:44px;stroke:var(--border);stroke-width:1.5;fill:none;margin:0 auto .75rem;display:block}

.loading{text-align:center;padding:2.5rem;color:var(--muted);font-size:.88rem}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <svg width="38" height="38" viewBox="0 0 38 38">
        <circle cx="19" cy="19" r="16" fill="none" stroke="#1B5E37" stroke-width="2"/>
        <text x="19" y="24.5" text-anchor="middle" font-family="DM Serif Display,serif" font-size="14" fill="#1B5E37">G</text>
      </svg>
      <div class="login-marca">Genthe Consultoria<small>Painel PSI — Cartório Pantaneiro</small></div>
    </div>
    <label>Senha de acesso</label>
    <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-entrar" id="btnEntrar">Entrar</button>
    <p class="login-erro" id="loginErro">Senha incorreta. Tente novamente.</p>
  </div>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">
  <header class="ph">
    <div class="ph-inner">
      <div class="ph-brand">
        <svg width="28" height="28" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.4"/>
          <text x="16" y="20.5" text-anchor="middle" font-family="DM Serif Display,serif" font-size="11" fill="rgba(255,255,255,0.9)">G</text>
        </svg>
        <div>
          <div class="ph-sub">Genthe Consultoria · Cartório Pantaneiro</div>
          <div class="ph-nome">Painel PSI — Auxiliar de Escrevente · Notas</div>
        </div>
      </div>
      <button class="btn-sair" id="btnSair">Sair</button>
    </div>
  </header>

  <div class="stats" id="statsWrap">
    <div class="stat"><div class="stat-l">Total de inscrições</div><div class="stat-v" id="stTotal">—</div></div>
    <div class="stat"><div class="stat-l">Hoje</div><div class="stat-v" id="stHoje">—</div></div>
    <div class="stat"><div class="stat-l">Esta semana</div><div class="stat-v" id="stSemana">—</div></div>
    <div class="stat"><div class="stat-l">Mais recente</div><div class="stat-v" style="font-size:.85rem;padding-top:4px" id="stRecente">—</div></div>
  </div>

  <div class="toolbar">
    <span class="toolbar-titulo">Candidaturas recebidas</span>
    <button class="btn-acao" id="btnAtualizar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Atualizar
    </button>
    <button class="btn-acao verde" id="btnExportar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </button>
  </div>

  <div class="busca-wrap">
    <input class="busca" type="text" id="busca" placeholder="Buscar por nome, cargo ou setor...">
  </div>

  <div class="cards-wrap" id="cardsWrap">
    <div class="loading" id="loading">Carregando candidaturas...</div>
  </div>
</div>

<script>
// ── RÓTULOS ──────────────────────────────────────────────────────────────────
const LABELS = {
  nome:'Nome completo', cargo_atual:'Cargo atual', setor_atual:'Departamento atual',
  tempo_casa:'Tempo de casa', motivo:'Motivação para a vaga', formacao:'Formação',
  curso:'Curso em andamento', exp_documental:'Exp. com documentação',
  exp_detalhe:'Detalhe da experiência', atos_conhecidos:'Atos notariais conhecidos',
  informatica:'Domínio de informática (1–5)', prazos:'Gestão de prazos',
  situacao_erro:'Situação de erro relatada', certidoes:'Exp. com certidões',
  desenvolvimento:'Ações de desenvolvimento', val_respeito:'Significado de respeito',
  comprometimento:'Comprometimento (1–5)', trabalho_equipe:'Trabalho em equipe',
  alta_demanda:'Reação sob alta demanda', feedback:'Receptividade a feedback',
  atencao_detalhe:'Atenção a detalhes (1–5)', valor_identificacao:'Valor de identificação',
  projecao:'Projeção de carreira', complemento:'Informações complementares',
  aceite_lgpd:'Aceite LGPD',
};

const SECOES = {
  'Inscrição interna':       ['nome','cargo_atual','setor_atual','tempo_casa','motivo','formacao','curso'],
  'Análise de perfil':       ['exp_documental','exp_detalhe','atos_conhecidos','informatica','prazos','situacao_erro','certidoes','desenvolvimento'],
  'Avaliação comportamental':['val_respeito','comprometimento','trabalho_equipe','alta_demanda','feedback','atencao_detalhe','valor_identificacao','projecao','complemento'],
};

const TEMPO = {menos_6m:'Menos de 6 meses','6m_1a':'6 meses a 1 ano','1a_2a':'1 a 2 anos',mais_2a:'Mais de 2 anos'};
const FORM  = {em_completo:'Ensino Médio completo',sup_cursando:'Superior em andamento',sup_completo:'Superior completo',pos:'Pós-graduação'};
const EXP   = {sim_cartorio:'Sim, em cartório',sim_outro:'Sim, em outra área',nao:'Não'};
const DEM   = {a:'Mantém ritmo',b:'Acelera, se corrige',c:'Comunica ao superior',d:'Prioriza velocidade'};
const FEED  = {a:'Recebe e aplica',b:'Aceita, leva tempo',c:'Depende do tom',d:'Tem dificuldade'};
const PRAZ  = {a:'Cria listas e prioriza',b:'Por ordem de chegada',c:'Pede orientação',d:'Em desenvolvimento'};
const CERT  = {sim_freq:'Sim, com frequência',sim_pouco:'Sim, algumas vezes',nao_sei:'Não, mas sabe o que são',nao:'Não'};

function fmt(key, val) {
  if (val === null || val === undefined || val === '') return '—';
  if (key === 'tempo_casa') return TEMPO[val] || val;
  if (key === 'formacao')   return FORM[val]  || val;
  if (key === 'exp_documental') return EXP[val] || val;
  if (key === 'alta_demanda')   return DEM[val] || val;
  if (key === 'feedback')       return FEED[val]|| val;
  if (key === 'prazos')         return PRAZ[val]|| val;
  if (key === 'certidoes')      return CERT[val]|| val;
  if (key === 'aceite_lgpd')    return val ? 'Sim — concordou' : 'Não';
  return val;
}

const LONGAS = new Set(['motivo','situacao_erro','desenvolvimento','val_respeito','trabalho_equipe','valor_identificacao','projecao','complemento','exp_detalhe']);

// ── LOGIN ────────────────────────────────────────────────────────────────────
let autenticado = false;

function tentarLogin() {
  const senha = document.getElementById('inputSenha').value;
  if (senha === ADMIN_PASSWORD) {
    autenticado = true;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
    carregarDados();
  } else {
    document.getElementById('loginErro').style.display = 'block';
  }
}
document.getElementById('btnEntrar').addEventListener('click', tentarLogin);
document.getElementById('inputSenha').addEventListener('keydown', e => { if (e.key === 'Enter') tentarLogin(); });
document.getElementById('btnSair').addEventListener('click', () => {
  autenticado = false;
  document.getElementById('painel').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('inputSenha').value = '';
  document.getElementById('loginErro').style.display = 'none';
});

// ── SUPABASE FETCH ───────────────────────────────────────────────────────────
let todasRespostas = [];

async function carregarDados() {
  document.getElementById('loading').style.display = 'block';
  document.querySelectorAll('.card').forEach(c => c.remove());

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/psi_respostas?select=*&order=created_at.desc`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        }
      }
    );
    if (!res.ok) throw new Error(await res.text());
    todasRespostas = await res.json();
    renderStats(todasRespostas);
    renderCards(todasRespostas);
  } catch(e) {
    document.getElementById('loading').textContent = 'Erro ao carregar dados. Verifique a conexão com o Supabase.';
    console.error(e);
  }
}

// ── STATS ────────────────────────────────────────────────────────────────────
function renderStats(dados) {
  const hoje = new Date().toLocaleDateString('pt-BR');
  const semAtras = new Date(Date.now() - 7*86400000).toISOString();

  document.getElementById('stTotal').textContent = dados.length;
  document.getElementById('stHoje').textContent = dados.filter(r => {
    return r.created_at && r.created_at.startsWith(new Date().toISOString().slice(0,10));
  }).length;
  document.getElementById('stSemana').textContent = dados.filter(r => r.created_at > semAtras).length;

  const mais = dados[0];
  document.getElementById('stRecente').textContent = mais
    ? new Date(mais.created_at).toLocaleString('pt-BR')
    : '—';
}

// ── CARDS ────────────────────────────────────────────────────────────────────
function renderCards(dados) {
  const wrap = document.getElementById('cardsWrap');
  document.getElementById('loading').style.display = 'none';
  wrap.querySelectorAll('.card').forEach(c => c.remove());

  if (dados.length === 0) {
    wrap.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Nenhuma candidatura recebida ainda.</div>`;
    return;
  }

  dados.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';

    const data = r.created_at
      ? new Date(r.created_at).toLocaleString('pt-BR')
      : '—';

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-nome">${r.nome || '(sem nome)'}</div>
          <div class="card-tags">
            <span class="tag tag-data">${data}</span>
            <span class="tag tag-cargo">${r.cargo_atual || '—'}</span>
            <span class="tag tag-setor">${r.setor_atual || '—'}</span>
          </div>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="card-body">
        ${Object.entries(SECOES).map(([nome, campos]) => `
          <div class="secao">
            <div class="secao-titulo">${nome}</div>
            <div class="grid">
              ${campos.map(c => {
                const v = fmt(c, r[c]);
                if (v === '—' && !['complemento','exp_detalhe','curso'].includes(c)) return '';
                return `<div class="item${LONGAS.has(c)?' full':''}">
                  <div class="item-l">${LABELS[c]||c}</div>
                  <div class="item-v">${v}</div>
                </div>`;
              }).join('')}
            </div>
          </div>`).join('')}
      </div>`;

    card.querySelector('.card-top').addEventListener('click', () => card.classList.toggle('aberto'));
    wrap.appendChild(card);
  });
}

// ── BUSCA ────────────────────────────────────────────────────────────────────
document.getElementById('busca').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  if (!q) { renderCards(todasRespostas); return; }
  renderCards(todasRespostas.filter(r =>
    JSON.stringify(r).toLowerCase().includes(q)
  ));
});

// ── ATUALIZAR ────────────────────────────────────────────────────────────────
document.getElementById('btnAtualizar').addEventListener('click', carregarDados);

// ── EXPORTAR CSV ─────────────────────────────────────────────────────────────
document.getElementById('btnExportar').addEventListener('click', () => {
  if (todasRespostas.length === 0) { alert('Nenhuma resposta para exportar.'); return; }
  const campos = ['created_at', 'vaga', ...Object.keys(LABELS)];
  const header = campos.map(c => LABELS[c] || c);
  const linhas = todasRespostas.map(r =>
    campos.map(c => {
      const v = r[c];
      if (v === null || v === undefined) return '';
      return String(v).replace(/"/g,'""');
    })
  );
  const csv = [header, ...linhas].map(row => row.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `PSI_AuxiliarEscrevente_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
